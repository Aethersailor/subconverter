name: Build and Publish Docker Images

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref or commit to build
        required: false
        type: string
      version:
        description: Expected application version
        required: false
        type: string
      push:
        description: Push images to registries
        required: false
        default: false
        type: boolean
      run_smoke:
        description: Build amd64 and run integration tests
        required: false
        default: true
        type: boolean
      publish_latest:
        description: Publish latest and edge aliases
        required: false
        default: false
        type: boolean
      publish_stable:
        description: Publish stable alias
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit to build
        required: false
        type: string
      push:
        description: Push images to registries
        required: true
        default: false
        type: boolean
      run_smoke:
        description: Run the outbound-header smoke test before publishing
        required: true
        default: true
        type: boolean
      publish_latest:
        description: Publish latest and edge aliases
        required: true
        default: false
        type: boolean
      publish_stable:
        description: Publish stable alias
        required: true
        default: false
        type: boolean
  push:
    branches: [master]
    paths-ignore:
      - README.md
      - .github/templates/README.md.tmpl

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: aethersailor/subconverter
  GHCR_IMAGE: ghcr.io/aethersailor/subconverter

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      project_commit: ${{ steps.metadata.outputs.project_commit }}
      project_commit_short: ${{ steps.metadata.outputs.project_commit_short }}
      upstream_commit: ${{ steps.metadata.outputs.upstream_commit }}
      should_push: ${{ steps.metadata.outputs.should_push }}
      publish_latest: ${{ steps.metadata.outputs.publish_latest }}
      publish_stable: ${{ steps.metadata.outputs.publish_stable }}
      run_smoke: ${{ steps.metadata.outputs.run_smoke }}
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Resolve build metadata
        id: metadata
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          INPUT_PUSH: ${{ inputs.push }}
          INPUT_LATEST: ${{ inputs.publish_latest }}
          INPUT_STABLE: ${{ inputs.publish_stable }}
          INPUT_SMOKE: ${{ inputs.run_smoke }}
        shell: bash
        run: |
          set -euo pipefail
          project_commit="$(git rev-parse HEAD)"
          project_commit_short="$(git rev-parse --short=8 HEAD)"
          version="$(python3 scripts/project_metadata.py version --project-commit "$project_commit")"
          upstream_commit="$(python3 -c 'import json; print(json.load(open(".github/project-metadata.json"))["upstream_commit"])')"
          python3 scripts/project_metadata.py render --check

          if [[ -n "$EXPECTED_VERSION" && "$EXPECTED_VERSION" != "$version" ]]; then
            echo "Expected version $EXPECTED_VERSION but resolved $version" >&2
            exit 1
          fi

          should_push="$INPUT_PUSH"
          publish_latest="$INPUT_LATEST"
          publish_stable="$INPUT_STABLE"
          run_smoke="${INPUT_SMOKE:-true}"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            should_push=true
            publish_latest=true
            publish_stable=false
            run_smoke=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "project_commit=$project_commit" >> "$GITHUB_OUTPUT"
          echo "project_commit_short=$project_commit_short" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$upstream_commit" >> "$GITHUB_OUTPUT"
          echo "should_push=$should_push" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$publish_latest" >> "$GITHUB_OUTPUT"
          echo "publish_stable=$publish_stable" >> "$GITHUB_OUTPUT"
          echo "run_smoke=$run_smoke" >> "$GITHUB_OUTPUT"

  smoke:
    needs: prepare
    if: needs.prepare.outputs.run_smoke == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.project_commit }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build smoke image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: scripts/Dockerfile
          load: true
          push: false
          tags: local/subconverter:${{ needs.prepare.outputs.version }}
          build-args: |
            PROJECT_COMMIT=${{ needs.prepare.outputs.project_commit }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            UPSTREAM_COMMIT=${{ needs.prepare.outputs.upstream_commit }}

      - name: Run image integration tests
        env:
          IMAGE: local/subconverter:${{ needs.prepare.outputs.version }}
          EXPECTED_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm \
            --name subconverter-smoke \
            --add-host host.docker.internal:host-gateway \
            -p 127.0.0.1:25500:25500 \
            "$IMAGE"
          trap 'docker stop subconverter-smoke >/dev/null 2>&1 || true' EXIT
          python3 scripts/test_outbound_headers.py \
            --service-url http://127.0.0.1:25500 \
            --echo-host host.docker.internal \
            --expected-version "$EXPECTED_VERSION"

  build:
    needs: [prepare, smoke]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.should_push == 'true' &&
      (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/386
            os: ubuntu-latest
          - platform: linux/arm/v7
            os: ubuntu-24.04-arm
          - platform: linux/arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    name: Image ${{ matrix.platform }}
    steps:
      - name: Prepare platform name
        id: platform
        shell: bash
        run: echo "pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.project_commit }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Hub image by digest
        id: dockerhub_image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: scripts/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            PROJECT_COMMIT=${{ needs.prepare.outputs.project_commit }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            UPSTREAM_COMMIT=${{ needs.prepare.outputs.upstream_commit }}
          outputs: type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Build and push GHCR image by digest
        id: ghcr_image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: scripts/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            PROJECT_COMMIT=${{ needs.prepare.outputs.project_commit }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            UPSTREAM_COMMIT=${{ needs.prepare.outputs.upstream_commit }}
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export registry digests
        env:
          DOCKERHUB_DIGEST: ${{ steps.dockerhub_image.outputs.digest }}
          GHCR_DIGEST: ${{ steps.ghcr_image.outputs.digest }}
        shell: bash
        run: |
          mkdir -p /tmp/digests/dockerhub /tmp/digests/ghcr
          touch "/tmp/digests/dockerhub/${DOCKERHUB_DIGEST#sha256:}"
          touch "/tmp/digests/ghcr/${GHCR_DIGEST#sha256:}"

      - name: Upload Docker Hub digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-dockerhub-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/dockerhub/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload GHCR digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-ghcr-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/ghcr/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_push == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: aethersailor/subconverter
            digest_pattern: image-digest-dockerhub-*
          - image: ghcr.io/aethersailor/subconverter
            digest_pattern: image-digest-ghcr-*
    name: Publish ${{ matrix.image }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: ${{ matrix.digest_pattern }}
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        if: matrix.image == 'aethersailor/subconverter'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        if: startsWith(matrix.image, 'ghcr.io/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PROJECT_COMMIT_SHORT: ${{ needs.prepare.outputs.project_commit_short }}
          PUBLISH_LATEST: ${{ needs.prepare.outputs.publish_latest }}
          PUBLISH_STABLE: ${{ needs.prepare.outputs.publish_stable }}
        working-directory: /tmp/digests
        shell: bash
        run: |
          set -euo pipefail
          tags=(-t "$IMAGE:$VERSION" -t "$IMAGE:sha-$PROJECT_COMMIT_SHORT")
          if [[ "$PUBLISH_LATEST" == "true" ]]; then
            tags+=(-t "$IMAGE:latest" -t "$IMAGE:edge")
          fi
          if [[ "$PUBLISH_STABLE" == "true" ]]; then
            tags+=(-t "$IMAGE:stable")
          fi
          docker buildx imagetools create "${tags[@]}" \
            $(printf "$IMAGE@sha256:%s " *)
          docker buildx imagetools inspect "$IMAGE:$VERSION"
