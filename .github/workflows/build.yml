name: Build Native Artifacts

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref or commit to build
        required: false
        type: string
    outputs:
      version:
        description: Resolved application version
        value: ${{ jobs.prepare.outputs.version }}
      project_commit:
        description: Full project commit
        value: ${{ jobs.prepare.outputs.project_commit }}
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit to build
        required: false
        type: string
  push:
    branches: [master]
    paths-ignore:
      - README.md
      - .github/templates/README.md.tmpl
  pull_request:
    paths-ignore:
      - README.md
      - .github/templates/README.md.tmpl

permissions:
  contents: read

concurrency:
  group: native-${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      project_commit: ${{ steps.metadata.outputs.project_commit }}
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Resolve build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          project_commit="$(git rev-parse HEAD)"
          version="$(python3 scripts/project_metadata.py version --project-commit "$project_commit")"
          python3 scripts/project_metadata.py render --check
          python3 -m unittest discover -s tests -v
          echo "project_commit=$project_commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  linux:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            artifact: linux-386
            os: ubuntu-latest
          - arch: amd64
            artifact: linux-amd64
            os: ubuntu-latest
          - arch: armv7
            artifact: linux-armv7
            os: ubuntu-24.04-arm
          - arch: aarch64
            artifact: linux-arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    name: Linux ${{ matrix.arch }}
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.project_commit }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Build
        env:
          SUBCONVERTER_PROJECT_COMMIT: ${{ needs.prepare.outputs.project_commit }}
          SUBCONVERTER_BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          docker run --rm \
            -e SUBCONVERTER_PROJECT_COMMIT \
            -e SUBCONVERTER_BUILD_VERSION \
            -v "$GITHUB_WORKSPACE:/root/workdir" \
            "multiarch/alpine:${{ matrix.arch }}-latest-stable" \
            /bin/sh -c "apk add bash git && cd /root/workdir && chmod +x scripts/build.alpine.release.sh && bash scripts/build.alpine.release.sh"

      - name: Package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: tar -czf "subconverter-${VERSION}-${{ matrix.artifact }}.tar.gz" subconverter

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: subconverter-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}
          path: subconverter-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact: macos-amd64
            os: macos-15-intel
          - arch: arm64
            artifact: macos-arm64
            os: macos-15
    runs-on: ${{ matrix.os }}
    name: macOS ${{ matrix.arch }}
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.project_commit }}
          fetch-depth: 0

      - name: Build
        env:
          SUBCONVERTER_PROJECT_COMMIT: ${{ needs.prepare.outputs.project_commit }}
          SUBCONVERTER_BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: bash scripts/build.macos.release.sh

      - name: Package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: tar -czf "subconverter-${VERSION}-${{ matrix.artifact }}.tar.gz" subconverter

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: subconverter-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}
          path: subconverter-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  windows:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            artifact: windows-386
            environment: i686
            msystem: MINGW32
          - arch: amd64
            artifact: windows-amd64
            environment: x86_64
            msystem: MINGW64
    runs-on: windows-latest
    name: Windows ${{ matrix.arch }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.project_commit }}
          fetch-depth: 0

      - name: Set up MSYS2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          update: true
          install: base-devel git mingw-w64-${{ matrix.environment }}-gcc mingw-w64-${{ matrix.environment }}-cmake mingw-w64-${{ matrix.environment }}-pcre2 patch
          msystem: ${{ matrix.msystem }}
          path-type: inherit

      - name: Build
        env:
          SUBCONVERTER_PROJECT_COMMIT: ${{ needs.prepare.outputs.project_commit }}
          SUBCONVERTER_BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        run: bash scripts/build.windows.release.sh

      - name: Package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: 7z a "subconverter-${VERSION}-${{ matrix.artifact }}.7z" subconverter/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: subconverter-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}
          path: subconverter-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}.7z
          if-no-files-found: error
          retention-days: 30
